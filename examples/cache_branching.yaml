components:
  - id: api
    type: bounded_queue
    service_time:
      distribution: exponential
      mean: 0.2
    workers: 5
    max_queue_size: 20
    next_component:
      - target: cache
        probability: 0.8
      - target: db
        probability: 0.2

  - id: cache
    type: component
    service_time: 0.05
    workers: 10

  - id: db
    type: component
    service_time:
      distribution: lognormal
      mean: -0.5
      sigma: 0.8
    workers: 3

simulation:
  entry: api
  rps: 20
  duration: 30
  seed: 42
  stochastic: true
